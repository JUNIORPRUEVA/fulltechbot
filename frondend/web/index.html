<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tienda oficial FULLTECH SRL. Tecnología, seguridad y automatización.">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH SRL</title>
  <link rel="manifest" href="manifest.json">

  <!-- Meta tags anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 
    ============================================================
    FULLTECH STORE - FIX: DESREGISTRAR SERVICE WORKER ANTERIOR
    ============================================================
    El Service Worker anterior estaba cacheando la versión vieja
    de la app (FullTech Bot admin) y sirviéndola en lugar de la
    nueva versión con la tienda.
    
    SOLUCIÓN: Desregistramos el SW anterior, limpiamos todos los
    caches, y NO registramos un nuevo SW para evitar este problema.
    
    La app funciona perfectamente sin Service Worker.
    ============================================================
  -->
  <script>
    (function() {
      'use strict';
      
      // ==========================================
      // 1. DESREGISTRAR cualquier Service Worker existente
      // ==========================================
      if ('serviceWorker' in navigator) {
        // Obtener todos los registros de SW y desregistrarlos
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          console.log('[FIX] Service Workers encontrados:', registrations.length);
          for (var i = 0; i < registrations.length; i++) {
            var registration = registrations[i];
            console.log('[FIX] Desregistrando SW:', registration.active ? registration.active.scriptURL : 'unknown');
            registration.unregister().then(function(success) {
              console.log('[FIX] SW desregistrado:', success);
            });
          }
        }).catch(function(err) {
          console.warn('[FIX] Error obteniendo registros SW:', err);
        });
        
        // Escuchar cuando el SW se desconecte para recargar
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          console.log('[FIX] SW cambiado, recargando página...');
          window.location.reload();
        });
      }
      
      // ==========================================
      // 2. LIMPIAR TODOS LOS CACHES
      // ==========================================
      if (window.caches) {
        caches.keys().then(function(cacheNames) {
          console.log('[FIX] Caches encontrados:', cacheNames);
          return Promise.all(
            cacheNames.map(function(cacheName) {
              console.log('[FIX] Eliminando cache:', cacheName);
              return caches.delete(cacheName);
            })
          );
        }).then(function() {
          console.log('[FIX] Todos los caches eliminados correctamente');
        }).catch(function(err) {
          console.warn('[FIX] Error limpiando caches:', err);
        });
      }
      
      console.log('[FIX] Service Worker desregistrado y caches limpiados');
      console.log('[FIX] La app cargará FRESCA desde el servidor');
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
