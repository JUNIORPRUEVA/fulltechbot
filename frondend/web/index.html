<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tienda oficial FULLTECH SRL. Tecnología, seguridad y automatización.">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH SRL</title>
  <link rel="manifest" href="manifest.json">

  <!-- Meta tags anti-cache para evitar que el navegador sirva versiones viejas del HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Service Worker personalizado con estrategia de cache optimizada -->
  <script>
    if ('serviceWorker' in navigator) {
      // Registrar service worker personalizado
      navigator.serviceWorker.register('/service_worker.js')
        .then((registration) => {
          console.log('[PWA] Service Worker registrado correctamente');

          // Detectar nueva versión del service worker
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] Nueva versión disponible - actualizando automáticamente');
                // Enviar mensaje para activar el nuevo SW inmediatamente
                newWorker.postMessage('SKIP_WAITING');
              }
            });
          });
        })
        .catch((error) => {
          console.warn('[PWA] Error registrando Service Worker:', error);
        });

      // Refrescar automáticamente cuando se active un nuevo service worker
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        console.log('[PWA] Nuevo service worker activado, recargando para aplicar cambios...');
        window.location.reload();
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
