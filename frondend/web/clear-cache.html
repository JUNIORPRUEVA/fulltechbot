<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Limpiando cache - FULLTECH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      max-width: 480px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(37, 99, 235, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #94A3B8; line-height: 1.6; margin-bottom: 8px; font-size: 14px; }
    .status { color: #22C55E; font-weight: 600; margin-top: 16px; }
    .error { color: #EF4444; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧹</div>
    <h1>Limpiando cache...</h1>
    <p>Estamos eliminando versiones anteriores almacenadas en tu navegador.</p>
    <p>Esto solo tomará unos segundos.</p>
    <div id="status" class="status">Procesando...</div>
  </div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const steps = [];
      
      // 1. Desregistrar Service Workers
      if ('serviceWorker' in navigator) {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const reg of registrations) {
            await reg.unregister();
            steps.push('✓ Service Worker desregistrado');
          }
          if (registrations.length === 0) steps.push('✓ No había Service Workers');
        } catch(e) {
          steps.push('⚠ Error desregistrando SW: ' + e.message);
        }
      } else {
        steps.push('✓ Service Workers no soportados');
      }
      
      // 2. Limpiar caches
      if (window.caches) {
        try {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
          steps.push('✓ ' + cacheNames.length + ' cache(s) eliminados');
        } catch(e) {
          steps.push('⚠ Error limpiando caches: ' + e.message);
        }
      } else {
        steps.push('✓ Cache API no soportada');
      }
      
      // 3. Limpiar localStorage (solo claves relacionadas con cache/routing)
      try {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && (key.toLowerCase().includes('cache') || 
                      key.toLowerCase().includes('route') ||
                      key.toLowerCase().includes('sw') ||
                      key.toLowerCase().includes('service_worker'))) {
            keysToRemove.push(key);
          }
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
        steps.push('✓ ' + keysToRemove.length + ' clave(s) de localStorage limpiadas');
      } catch(e) {
        steps.push('⚠ Error limpiando localStorage: ' + e.message);
      }
      
      // Mostrar resultados
      statusEl.innerHTML = steps.join('<br>');
      
      // Redirigir a la tienda después de 2 segundos
      setTimeout(function() {
        statusEl.innerHTML = '✓ Todo limpio. Redirigiendo a la tienda...';
        setTimeout(function() {
          window.location.replace('/#/tienda/fulltech-seguridad');
        }, 1000);
      }, 1500);
    })();
  </script>
</body>
</html>
