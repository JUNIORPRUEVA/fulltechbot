<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tienda oficial FULLTECH SRL. Tecnología, seguridad y automatización.">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH SRL</title>
  <link rel="manifest" href="manifest.json">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script>
    (function() {
      'use strict';
      var BUILD_VERSION = '__FULLTECH_BUILD_VERSION__';
      var VERSION_KEY = 'fulltech_app_version';

      function clearRuntimeCaches() {
        var tasks = [];

        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              return Promise.all(
                registrations.map(function(registration) {
                  return registration.unregister();
                })
              );
            })
          );
        }

        if (window.caches) {
          tasks.push(
            caches.keys().then(function(cacheNames) {
              return Promise.all(
                cacheNames.map(function(cacheName) {
                  return caches.delete(cacheName);
                })
              );
            })
          );
        }

        return Promise.all(tasks).catch(function(error) {
          console.warn('[FULLTECH] Error limpiando caches:', error);
        });
      }

      function loadFlutter(version) {
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(version || Date.now().toString());
        script.async = true;
        document.body.appendChild(script);
      }

      fetch('version.json?ts=' + Date.now(), { cache: 'no-store' })
        .then(function(response) {
          if (!response.ok) throw new Error('No se pudo cargar version.json');
          return response.json();
        })
        .then(function(payload) {
          var currentVersion =
            BUILD_VERSION !== '__FULLTECH_BUILD_VERSION__'
              ? BUILD_VERSION
              : (payload && payload.version) || Date.now().toString();
          var lastVersion = localStorage.getItem(VERSION_KEY);

          if (lastVersion && lastVersion !== currentVersion) {
            return clearRuntimeCaches().then(function() {
              localStorage.setItem(VERSION_KEY, currentVersion);
              loadFlutter(currentVersion);
            });
          }

          localStorage.setItem(VERSION_KEY, currentVersion);
          loadFlutter(currentVersion);
        })
        .catch(function() {
          clearRuntimeCaches().finally(function() {
            loadFlutter(Date.now().toString());
          });
        });
    })();
  </script>
</head>
<body>
</body>
</html>
