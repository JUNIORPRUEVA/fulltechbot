server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # Regla principal: SPA routing
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # index.html: NUNCA cachear
    # ==========================================
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================
    # clear-cache.html: NUNCA cachear
    # ==========================================
    location = /clear-cache.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================
    # service_worker.js: NUNCA cachear
    # ==========================================
    location = /service_worker.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/";
    }

    # ==========================================
    # flutter_bootstrap.js: No cachear (cambia en cada build)
    # ==========================================
    location = /flutter_bootstrap.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # main.dart.js: No cachear (cambia en cada build)
    # ==========================================
    location = /main.dart.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # Assets estáticos: Cache largo (con hash en nombre)
    # ==========================================
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|json)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ==========================================
    # Manifest y version: No cachear
    # ==========================================
    location = /manifest.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /version.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # ==========================================
    # Security headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
