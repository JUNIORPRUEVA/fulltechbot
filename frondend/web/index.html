<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tienda oficial FULLTECH SRL. Tecnología, seguridad y automatización.">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH SRL</title>
  <link rel="manifest" href="manifest.json">

  <!-- Meta tags anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 
    ============================================================
    FIX DEFINITIVO: REDIRECT INMEDIATO A LA TIENDA
    ============================================================
    Cuando el usuario entra a https://fulltechrd.com, esto se ejecuta
    ANTES de que Flutter cargue, redirigiendo inmediatamente a la tienda.
    
    También desregistra cualquier Service Worker viejo y limpia caches.
    ============================================================
  -->
  <script>
    (function() {
      'use strict';
      
      // ==========================================
      // 1. REDIRECT INMEDIATO A LA TIENDA
      //    Esto se ejecuta antes de que Flutter cargue
      // ==========================================
      var path = window.location.pathname || "/";
      var hash = window.location.hash || "";
      var isRootPath = path === "/" || path === "";
      var isEmptyHash = hash === "" || hash === "#" || hash === "#/";
      
      // Si estamos en la raíz sin hash, redirigir a la tienda
      if (isRootPath && isEmptyHash) {
        console.log('[FIX] Redirigiendo a la tienda principal...');
        window.location.replace("/#/tienda/fulltech-seguridad");
        return; // Detener ejecución, la página se recargará
      }
      
      // ==========================================
      // 2. DESREGISTRAR Service Workers viejos
      // ==========================================
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
          }
        });
        
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      }
      
      // ==========================================
      // 3. LIMPIAR CACHES
      // ==========================================
      if (window.caches) {
        caches.keys().then(function(cacheNames) {
          return Promise.all(
            cacheNames.map(function(cacheName) {
              return caches.delete(cacheName);
            })
          );
        });
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
