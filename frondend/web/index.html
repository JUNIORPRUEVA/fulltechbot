<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tienda oficial FULLTECH SRL. Tecnología, seguridad y automatización.">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH SRL</title>
  <link rel="manifest" href="manifest.json">

  <!-- Meta tags anti-cache para evitar que el navegador sirva versiones viejas del HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 
    FULLTECH STORE - Service Worker v3
    Estrategia: Siempre red primero para navegación.
    Si ves una versión anterior, haz Ctrl+F5 para forzar recarga.
  -->
  <script>
    (function() {
      'use strict';
      
      if (!('serviceWorker' in navigator)) return;
      
      // ==========================================
      // 1. Limpiar TODOS los caches existentes al cargar la página
      //    Esto asegura que no se sirvan versiones antiguas
      // ==========================================
      if (window.caches) {
        caches.keys().then(function(cacheNames) {
          return Promise.all(
            cacheNames.map(function(cacheName) {
              console.log('[PWA] Limpiando cache:', cacheName);
              return caches.delete(cacheName);
            })
          );
        }).then(function() {
          console.log('[PWA] Todos los caches antiguos eliminados');
        }).catch(function(err) {
          console.warn('[PWA] Error limpiando caches:', err);
        });
      }
      
      // ==========================================
      // 2. Dar tiempo para que se limpien los caches
      //    y luego registrar el nuevo service worker
      // ==========================================
      setTimeout(function() {
        navigator.serviceWorker.register('/service_worker.js?t=' + Date.now())
          .then(function(registration) {
            console.log('[PWA] Service Worker v3 registrado correctamente');
            
            // Si ya hay un SW activo, forzar actualización
            if (registration.active) {
              registration.update();
            }
            
            // Detectar nueva versión del service worker
            registration.addEventListener('updatefound', function() {
              var newWorker = registration.installing;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] Nueva versión disponible - activando inmediatamente');
                  newWorker.postMessage('SKIP_WAITING');
                }
              });
            });
          })
          .catch(function(error) {
            console.warn('[PWA] Error registrando Service Worker:', error);
          });
        
        // Refrescar automáticamente cuando se active un nuevo service worker
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (refreshing) return;
          refreshing = true;
          console.log('[PWA] Nuevo service worker activado, recargando para aplicar cambios...');
          window.location.reload();
        });
      }, 500); // Esperar 500ms para asegurar limpieza de caches
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
